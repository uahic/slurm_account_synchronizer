---
# SLURM limit precedence (highest to lowest):
#   Partition QOS → Job QOS → User association → Account association(s) → Root/Cluster → Partition

declared_groups:
  ml_approved:
    groups:
      - ml_team       # base unix group
    whitelist:
      - cluster_users # only keep users also in this group
    # add_users:
    #   - serviceaccount
    # exclude_users:
    #   - intern01

defaults:
  cluster: my-cluster   # must match ClusterName in slurm.conf
  organization: myorg
  groups:
    ml_approved:
      account: ml_group
  # users:
  #   jdoe:
  #     account: research

accounts:
  research:
    description: Top-level research account
    fairshare: 10
  ml_group:
    description: Machine learning research
    parent: research
    fairshare: 5
  bio_group:
    description: Bioinformatics
    parent: research
    fairshare: 3
  staff:
    description: Staff and administrators

associations:
  # debug_assoc:
  #   account: research
  #   partition: debug
  #   groups:
  #     - cluster_users
  #   fairshare: 1

  general_assoc:
    account: research
    groups:
      - cluster_users

  ml_gpu_assoc:
    account: ml_group
    groups:
      - ml_approved
    fairshare: 55

  bio_assoc:
    account: bio_group
    groups:
      - bio_team
